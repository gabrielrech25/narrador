<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Entrar — Portal RPG</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/public/css/base.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.wrap{width:min(420px,100%);}
.logo-section{text-align:center;margin-bottom:2.5rem;}
.logo{font-family:'Cinzel', Georgia, serif;font-size:clamp(32px,6vw,52px);color:var(--amber2);text-shadow:0 0 40px rgba(212,144,10,.3),0 2px 4px rgba(0,0,0,.8);letter-spacing:.06em;}
.logo-sub{font-family:'Cinzel',serif;font-size:10px;color:var(--cream4);letter-spacing:.4em;margin-top:8px;text-transform:uppercase;}
.logo-sep{color:var(--amber-dim);font-size:12px;letter-spacing:8px;margin:10px 0;}
.card{background:var(--stone-750);border:1px solid var(--stone-500);padding:32px 28px;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.card-title{font-family:'Cinzel',serif;font-size:15px;color:var(--amber2);text-align:center;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid var(--stone-600);letter-spacing:.08em;}
.f{margin-bottom:16px;}
.f label{display:block;font-family:'Cinzel',serif;font-size:9px;color:var(--cream4);letter-spacing:.16em;text-transform:uppercase;margin-bottom:5px;}
.f input{width:100%;background:var(--stone-900);border:1px solid var(--stone-600);color:var(--cream);padding:11px 13px;font-family: Verdana, Geneva, sans-serif;font-size:15px;outline:none;transition:all .2s;}
.f input:focus{border-color:var(--amber-dim);box-shadow:0 0 0 2px rgba(212,144,10,.15);}
.btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--amber-deep),var(--amber),var(--amber-deep));color:var(--stone-900);border:1px solid var(--amber-dim);font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.5);transition:all .2s;margin-top:8px;}
.btn-submit:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-submit:disabled{filter:grayscale(.6) brightness(.7);cursor:not-allowed;transform:none;}
.error-msg{background:rgba(143,31,31,.15);border:1px solid var(--scarlet);border-left:3px solid var(--scarlet2);color:var(--scarlet3);font-size:13px;padding:9px 12px;margin-bottom:14px;display:none;}
.error-msg.show{display:block;}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--stone-600);}
.divider span{font-family:'Cinzel',serif;font-size:9px;color:var(--cream4);letter-spacing:.08em;}
.footer-link{text-align:center;font-size:13px;color:var(--cream4);}
.footer-link a{color:var(--amber2);text-decoration:none;}
.footer-link a:hover{color:var(--amber3);text-decoration:underline;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-section">
    <div class="logo-sep">⸻ ✦ ⸻</div>
    <div class="logo">Portal RPG</div>
    <div class="logo-sub">D&amp;D 5e — Sistema Completo</div>
    <div class="logo-sep">⸻ ✦ ⸻</div>
  </div>
  <div class="card">
    <div class="card-title">⚔ Entrar no Portal</div>
    <div class="error-msg" id="err"></div>
    <div class="f"><label>Usuário</label><input type="text" id="u" placeholder="seu_usuario" autocomplete="username" autofocus></div>
    <div class="f"><label>Senha</label><input type="password" id="p" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-submit" id="btn" onclick="doLogin()">Entrar</button>
    <div class="divider"><span>ou</span></div>
    <div class="footer-link">Não tem conta? <a href="/register.html">Criar conta</a></div>
  </div>
</div>
<script>
const sid=localStorage.getItem('rpg_session');
if(sid)fetch('/api/auth/me',{headers:{'x-session-id':sid}}).then(r=>r.json()).then(d=>{if(d.user)location.href='/';}).catch(()=>{});
async function doLogin(){
  const u=document.getElementById('u').value.trim(),p=document.getElementById('p').value;
  const btn=document.getElementById('btn');
  if(!u||!p){showErr('Preencha todos os campos.');return;}
  btn.disabled=true;btn.textContent='Verificando...';
  document.getElementById('err').classList.remove('show');
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})}).then(x=>x.json());
    if(r.error){showErr(r.error);btn.disabled=false;btn.textContent='Entrar';return;}
    localStorage.setItem('rpg_session',r.sessionId);
    localStorage.setItem('rpg_user',JSON.stringify(r.user));
    location.href='/';
  }catch{showErr('Erro de conexão.');btn.disabled=false;btn.textContent='Entrar';}
}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('show');}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
