<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Criar Conta โ Portal RPG</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/public/css/base.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.wrap{width:min(420px,100%);}
.logo-section{text-align:center;margin-bottom:2rem;}
.logo{font-family:'Cinzel', Georgia, serif;font-size:clamp(30px,5vw,48px);color:var(--amber2);text-shadow:0 0 40px rgba(212,144,10,.3),0 2px 4px rgba(0,0,0,.8);letter-spacing:.06em;}
.logo-sep{color:var(--amber-dim);font-size:12px;letter-spacing:8px;margin:8px 0;}
.logo-sub{font-family:'Cinzel',serif;font-size:10px;color:var(--cream4);letter-spacing:.35em;text-transform:uppercase;}
.card{background:var(--stone-750);border:1px solid var(--stone-500);padding:32px 28px;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.card-title{font-family:'Cinzel',serif;font-size:15px;color:var(--amber2);text-align:center;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid var(--stone-600);letter-spacing:.08em;}
.f{margin-bottom:14px;}
.f label{display:block;font-family:'Cinzel',serif;font-size:9px;color:var(--cream4);letter-spacing:.16em;text-transform:uppercase;margin-bottom:5px;}
.f input{width:100%;background:var(--stone-900);border:1px solid var(--stone-600);color:var(--cream);padding:11px 13px;font-family: Verdana, Geneva, sans-serif;font-size:15px;outline:none;transition:all .2s;}
.f input:focus{border-color:var(--amber-dim);box-shadow:0 0 0 2px rgba(212,144,10,.15);}
.hint{font-size:11px;color:var(--cream4);margin-top:3px;font-style:italic;}
.btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--amber-deep),var(--amber),var(--amber-deep));color:var(--stone-900);border:1px solid var(--amber-dim);font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.5);transition:all .2s;margin-top:8px;}
.btn-submit:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-submit:disabled{filter:grayscale(.6) brightness(.7);cursor:not-allowed;transform:none;}
.msg{font-size:13px;padding:9px 12px;margin-bottom:14px;border-left:3px solid;display:none;}
.msg.show{display:block;}
.msg.err{background:rgba(143,31,31,.15);border-color:var(--scarlet2);color:var(--scarlet3);}
.msg.ok{background:rgba(46,96,64,.15);border-color:var(--moss2);color:var(--moss3);}
.footer-link{text-align:center;margin-top:18px;font-size:13px;color:var(--cream4);}
.footer-link a{color:var(--amber2);text-decoration:none;}
.footer-link a:hover{color:var(--amber3);text-decoration:underline;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-section">
    <div class="logo-sep">โธป โฆ โธป</div>
    <div class="logo">Portal RPG</div>
    <div class="logo-sub">Criar Nova Conta</div>
    <div class="logo-sep">โธป โฆ โธป</div>
  </div>
  <div class="card">
    <div class="card-title">๐ํณ Registrar Aventureiro</div>
    <div class="msg err" id="err"></div>
    <div class="msg ok"  id="ok"></div>
    <div class="f">
      <label>Usuรกrio</label>
      <input type="text" id="u" placeholder="aventureiro_123" autocomplete="username" autofocus maxlength="30">
      <div class="hint">Letras, nรบmeros e _ ยท mรญnimo 3 caracteres</div>
    </div>
    <div class="f">
      <label>Nome para Exibiรงรฃo</label>
      <input type="text" id="dn" placeholder="Seu nome" maxlength="40">
    </div>
    <div class="f">
      <label>Senha</label>
      <input type="password" id="p" placeholder="โขโขโขโขโขโขโขโข" autocomplete="new-password">
      <div class="hint">Mรญnimo 6 caracteres</div>
    </div>
    <div class="f">
      <label>Confirmar Senha</label>
      <input type="password" id="p2" placeholder="โขโขโขโขโขโขโขโข" autocomplete="new-password">
    </div>
    <button class="btn-submit" id="btn" onclick="doReg()">Criar Conta</button>
    <div class="footer-link" style="margin-top:16px">Jรก tem conta? <a href="/login.html">Entrar</a></div>
  </div>
</div>
<script>
async function doReg(){
  const u=document.getElementById('u').value.trim(),dn=document.getElementById('dn').value.trim();
  const p=document.getElementById('p').value,p2=document.getElementById('p2').value;
  const btn=document.getElementById('btn');
  clearMsgs();
  if(!u||!p)return showErr('Preencha os campos obrigatรณrios.');
  if(p!==p2)return showErr('As senhas nรฃo coincidem.');
  btn.disabled=true;btn.textContent='Criando conta...';
  try{
    const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p,displayName:dn})}).then(x=>x.json());
    if(r.error){showErr(r.error);btn.disabled=false;btn.textContent='Criar Conta';return;}
    localStorage.setItem('rpg_session',r.sessionId);
    localStorage.setItem('rpg_user',JSON.stringify(r.user));
    showOk('Conta criada! Redirecionando...');
    setTimeout(()=>location.href='/',1000);
  }catch{showErr('Erro de conexรฃo.');btn.disabled=false;btn.textContent='Criar Conta';}
}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('show');}
function showOk(m){const e=document.getElementById('ok');e.textContent=m;e.classList.add('show');}
function clearMsgs(){['err','ok'].forEach(id=>{const e=document.getElementById(id);e.classList.remove('show');});}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doReg();});
</script>
</body>
</html>
